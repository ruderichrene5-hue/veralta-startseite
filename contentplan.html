<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veralta — Contentplan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{--bg:#080c14;--surface:#0d1220;--surface2:#131828;--border:rgba(92,225,230,0.12);--border2:rgba(92,225,230,0.22);--accent:#5CE1E6;--text:#e8e4dc;--text-muted:rgba(232,228,220,0.45);--text-sub:rgba(232,228,220,0.65);--success:#4aba82;--warning:#e0a030;--danger:#e05858}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;border-bottom:0.5px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}
.nav-right{display:flex;align-items:center;gap:1rem}
.nav-name{font-size:13px;color:var(--text-muted)}
.nav-btn{font-size:12px;cursor:pointer;background:none;border:0.5px solid rgba(92,225,230,0.2);border-radius:20px;padding:4px 12px;font-family:"DM Sans",sans-serif;color:var(--accent)}
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:180px;background:var(--surface);border-right:0.5px solid var(--border);padding:14px 0;flex-shrink:0}
.sidebar-section{font-size:9px;color:rgba(234,230,222,0.2);text-transform:uppercase;letter-spacing:.15em;padding:14px 16px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:12px;color:rgba(234,230,222,0.45);border-left:2px solid transparent;text-decoration:none;transition:all .15s}
.nav-item:hover{color:var(--text);background:rgba(92,225,230,0.04)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(92,225,230,0.06)}
.nav-item i{font-size:15px;flex-shrink:0}
.content-area{flex:1;overflow-y:auto;padding:1.5rem;min-width:0}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);text-decoration:none;margin-bottom:1rem;transition:color .15s}
.back-link:hover{color:var(--accent)}
.page-title{font-size:18px;font-weight:500;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text-muted);margin-bottom:1.25rem}
.toprow{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
select,input[type="date"],input[type="text"],textarea{background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:13px;padding:8px 12px;outline:none}
.filters{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:"DM Sans",sans-serif}
.fbtn.active{background:var(--accent);color:#080c14;border-color:var(--accent);font-weight:500}
.add-btn{font-size:12px;padding:7px 14px;border-radius:8px;border:0.5px solid var(--border2);color:var(--accent);background:transparent;cursor:pointer;font-family:"DM Sans",sans-serif;margin-left:auto;white-space:nowrap}
.alert-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;background:rgba(224,88,88,0.08);border:0.5px solid rgba(224,88,88,0.25);color:var(--danger)}

/* OBEN - Aktive Aufgaben */
.day-sec{margin-bottom:16px}
.day-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:9px 14px;background:var(--surface);border-radius:9px;border:0.5px solid var(--border)}
.day-title{font-size:13px;font-weight:500;flex:1}
.day-today{color:var(--accent)}
.day-progress{font-size:11px;color:var(--text-muted);white-space:nowrap}
.day-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;width:60px}
.day-fill{height:100%;border-radius:2px}
.task{background:var(--surface2);border:0.5px solid var(--border);border-radius:9px;padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.task:hover{border-color:var(--border2)}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.chk.shot{background:var(--warning);border-color:var(--warning);color:#080c14}
.tinfo{flex:1;min-width:0}
.ttitle{font-size:13px;font-weight:500;margin-bottom:4px}
.tmeta{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.tnote{font-size:11px;color:var(--text-muted);margin-top:3px}
.bdg{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.br{background:#EEEDFE;color:#3C3489}.bs{background:#E1F5EE;color:#085041}.bp{background:#FAEEDA;color:#633806}
.ba{background:rgba(92,225,230,0.12);color:var(--accent);border:0.5px solid rgba(92,225,230,0.25)}
.bplat{background:rgba(255,255,255,0.05);color:var(--text-sub);border:0.5px solid rgba(255,255,255,0.08)}
.bshot{background:rgba(224,160,48,0.1);color:var(--warning);border:0.5px solid rgba(224,160,48,0.2);font-size:10px;padding:2px 7px;border-radius:20px}
.tact{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.btn-shot{font-size:11px;padding:4px 10px;border-radius:7px;border:0.5px solid rgba(224,160,48,0.3);background:transparent;color:var(--warning);cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap}
.btn-post{font-size:11px;padding:4px 10px;border-radius:7px;border:0.5px solid rgba(74,186,130,0.3);background:transparent;color:var(--success);cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap}
.btn-done{font-size:11px;padding:4px 10px;border-radius:7px;border:0.5px solid var(--border2);background:transparent;color:var(--accent);cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap}
.btn-edit{font-size:11px;padding:3px 8px;border-radius:6px;border:0.5px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:"DM Sans",sans-serif}
.btn-edit:hover{color:var(--accent);border-color:var(--border2)}
.del-icon{background:none;border:none;color:rgba(224,88,88,0.3);cursor:pointer;font-size:14px;padding:2px;transition:color .15s}
.del-icon:hover{color:var(--danger)}
.post-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);text-decoration:none;margin-top:4px;opacity:.7}
.post-link:hover{opacity:1}

/* UNTEN - Zwischenstand */
.zw-section{margin-top:2rem;padding-top:1.5rem;border-top:0.5px solid rgba(92,225,230,0.08)}
.zw-label{font-size:10px;color:rgba(234,230,222,0.22);text-transform:uppercase;letter-spacing:.14em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.zw-label::after{content:'';flex:1;height:0.5px;background:rgba(92,225,230,0.06)}
.zw-day{margin-bottom:14px}
.zw-day-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:5px 10px;border-radius:6px;background:rgba(255,255,255,0.02);border-left:2px solid rgba(92,225,230,0.15)}
.zw-day-title{font-size:11px;font-weight:500;flex:1;color:var(--text-sub)}
.zw-day-title.zw-today{color:var(--accent)}
.zw-day-count{font-size:10px;color:var(--text-muted)}
.zw-bar{height:2px;background:rgba(255,255,255,0.05);border-radius:1px;overflow:hidden;width:50px}
.zw-fill{height:100%;border-radius:1px}
.zw-item{display:flex;align-items:center;gap:10px;padding:7px 10px;margin-bottom:4px;border-radius:7px;background:var(--surface);border:0.5px solid rgba(92,225,230,0.05)}
.zw-chk{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;border:1px solid rgba(255,255,255,0.1)}
.zw-chk.zp{background:var(--success);border-color:var(--success);color:#080c14}
.zw-chk.zs{background:var(--warning);border-color:var(--warning);color:#080c14}
.zw-info{flex:1;min-width:0}
.zw-title{font-size:11px;color:var(--text-sub)}
.zw-status{font-size:10px;color:var(--text-muted);margin-top:1px}
.btn-undo-sm{font-size:10px;padding:3px 8px;border-radius:6px;border:0.5px solid rgba(255,255,255,0.07);background:transparent;color:rgba(234,230,222,0.3);cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap;flex-shrink:0}
.btn-undo-sm:hover{color:var(--text);border-color:var(--border2)}

.empty{text-align:center;padding:2.5rem;color:var(--text-muted);font-size:14px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-start;justify-content:center;padding:4rem 2rem;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:1.75rem;width:100%;max-width:460px;margin:auto}
.modal-title{font-size:15px;font-weight:500;margin-bottom:1.25rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:1rem}
.form-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{font-size:13px;padding:8px 16px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:"DM Sans",sans-serif}
.btn-save{font-size:13px;padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:#080c14;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif}
@media(max-width:680px){
  .hamburger{display:flex !important}
  .sidebar{position:fixed !important;top:58px;left:0;height:calc(100vh - 58px);z-index:99;transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0) !important}
  .content-area{padding:1rem !important}
}
</style>
</head>

      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:13px;color:var(--text-muted)">Model:</label>
        <select id="model-select" style="width:auto"></select>
      </div>
      <div class="filters">
        <button class="fbtn active" onclick="setFilter('all',this)">Alle</button>
        <button class="fbtn" onclick="setFilter('offen',this)">Offen</button>
        <button class="fbtn" onclick="setFilter('gedreht',this)">Gedreht</button>
      </div>
      <button class="add-btn" id="add-btn">+ Aufgabe</button>
    </div>
    <div id="alert-area"></div>
    <div id="task-list"><div class="empty">Lädt...</div></div>
    <div id="zw-area"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
    apiKey: "AIzaSyDvYCYMYN5e6eLpIqzPAKp7YXV72jdpO4w",
    authDomain: "veralta.firebaseapp.com",
    projectId: "veralta",
    storageBucket: "veralta.firebasestorage.app",
    messagingSenderId: "41250118519",
    appId: "1:41250118519:web:b7dbda9bba16a73aef1f72"
});
const auth=getAuth(app);
const db=getFirestore(app);
let tasks=[],models=[],currentModelId=null,currentFilter='all',currentUser=null,editId=null;
const today=new Date(),todayStr=today.toISOString().split('T')[0];
const bm={Reel:'br',Story:'bs',Post:'bp',Aufgabe:'ba'};

document.getElementById('logout-btn').onclick=()=>signOut(auth).then(()=>window.location.href='login');
document.getElementById('cancel-btn').onclick=closeModal;
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});
document.getElementById('add-btn').onclick=()=>openModal();
document.getElementById('f-date').value=todayStr;

function openModal(t=null){
  editId=t?t.id:null;
  document.getElementById('modal-title').textContent=t?'Aufgabe bearbeiten':'Neue Aufgabe';
  document.getElementById('f-date').value=t?t.date:todayStr;
  document.getElementById('f-type').value=t?t.type:'Reel';
  document.getElementById('f-platform').value=t?t.platform:'Instagram';
  document.getElementById('f-ref').value=t?.refLink||'';
  document.getElementById('f-link').value=t?.postLink||'';
  document.getElementById('f-note').value=t?.note||'';
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');editId=null;}

document.getElementById('save-btn').onclick=async()=>{
  const date=document.getElementById('f-date').value;
  const type=document.getElementById('f-type').value;
  const platform=document.getElementById('f-platform').value;
  const ref=document.getElementById('f-ref').value.trim();
  const link=document.getElementById('f-link').value.trim();
  const note=document.getElementById('f-note').value.trim();
  if(!date||!currentModelId){alert('Bitte Datum auswählen.');return;}
  const payload={date,type,platform,refLink:ref||null,postLink:link||null,note:note||null};
  if(editId){await updateDoc(doc(db,'tasks',editId),payload);}
  else{await addDoc(collection(db,'tasks'),{...payload,modelId:currentModelId,status:'Zu drehen',createdBy:currentUser.uid});}
  closeModal();await loadTasks();
};

onAuthStateChanged(auth,async(user)=>{
  if(!user){window.location.href='login';return;}
  currentUser=user;
  const snap=await getDoc(doc(db,'profiles',user.uid));
  if(!snap.exists()||snap.data().role!=='management'){window.location.href='model';return;}
  document.getElementById('nav-name').textContent=snap.data().name||'CEO';
  const msnap=await getDocs(query(collection(db,'profiles'),where('role','==','model')));
  models=msnap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById('model-select').innerHTML=models.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  currentModelId=models[0]?.id;
  document.getElementById('model-select').onchange=()=>{currentModelId=document.getElementById('model-select').value;loadTasks();};
  await loadTasks();
});

async function loadTasks(){
  if(!currentModelId)return;
  const snap=await getDocs(query(collection(db,'tasks'),where('modelId','==',currentModelId)));
  tasks=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.date.localeCompare(b.date));
  render();
}

window.setFilter=function(f,btn){currentFilter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();};
window.markShot=async id=>{await updateDoc(doc(db,'tasks',id),{status:'Gedreht'});await loadTasks();};
window.markPosted=async id=>{await updateDoc(doc(db,'tasks',id),{status:'Gepostet',postedAt:todayStr});await loadTasks();};
window.undoStatus=async id=>{await updateDoc(doc(db,'tasks',id),{status:'Zu drehen',postedAt:null});await loadTasks();};
window.deleteTask=async id=>{if(!confirm('Löschen?'))return;await deleteDoc(doc(db,'tasks',id));await loadTasks();};
window.editTask=id=>{const t=tasks.find(x=>x.id===id);if(t)openModal(t);};

function dayLabel(ds){
  const d=new Date(ds+'T12:00:00'),diff=Math.round((d-today)/(864e5));
  if(diff===0)return'Heute';if(diff===1)return'Morgen';if(diff===2)return'Übermorgen';if(diff===-1)return'Gestern';
  return d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit'});
}

function render(){
  const open=tasks.filter(t=>t.status!=='Gepostet');
  let filtered=open;
  if(currentFilter==='offen') filtered=open.filter(t=>t.status==='Zu drehen');
  else if(currentFilter==='gedreht') filtered=open.filter(t=>t.status==='Gedreht');

  const todayOpen=open.filter(t=>t.date===todayStr);
  document.getElementById('alert-area').innerHTML=todayOpen.length
    ?`<div class="alert-bar"><i class="ti ti-alert-circle"></i> Heute noch <strong>${todayOpen.length}</strong> Aufgabe${todayOpen.length>1?'n':''} offen!</div>`:'';

  if(!filtered.length){
    document.getElementById('task-list').innerHTML='<div class="empty">Keine offenen Aufgaben.</div>';
  } else {
    const grouped={};
    filtered.forEach(t=>{if(!grouped[t.date])grouped[t.date]=[];grouped[t.date].push(t);});
    let html='';
    Object.entries(grouped).forEach(([date,items])=>{
      const isToday=date===todayStr;
      const total=items.length;
      const done=items.filter(t=>t.status==='Gedreht').length;
      const pct=total?Math.round((done/total)*100):0;
      const barColor=pct===100?'var(--success)':pct>0?'var(--warning)':'rgba(255,255,255,0.06)';
      html+=`<div class="day-sec"><div class="day-hdr">
        <div class="day-title ${isToday?'day-today':''}">${dayLabel(date)}</div>
        <div class="day-progress">${done}/${total} erledigt</div>
        <div class="day-bar"><div class="day-fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>`;
      items.forEach(t=>{
        const isShot=t.status==='Gedreht',isA=t.type==='Aufgabe';
        let action=isA
          ?`${isShot?`<button class="btn-undo-sm" onclick="window.undoStatus('${t.id}')">↩</button>`:''}<button class="btn-done" onclick="window.markPosted('${t.id}')">Erledigt</button>`
          :isShot
          ?`<button class="btn-undo-sm" onclick="window.undoStatus('${t.id}')">↩</button><button class="btn-post" onclick="window.markPosted('${t.id}')">Als gepostet</button>`
          :`<button class="btn-shot" onclick="window.markShot('${t.id}')">Als gedreht</button><button class="btn-post" onclick="window.markPosted('${t.id}')">Als gepostet</button>`;
        html+=`<div class="task">
          <div class="chk ${isShot?'shot':''}"> ${isShot?'✓':''}</div>
          <div class="tinfo">
            <div class="ttitle">${isA?t.refLink||'Aufgabe':t.type+' — '+t.platform}</div>
            <div class="tmeta"><span class="bdg ${bm[t.type]||'br'}">${t.type}</span>${!isA&&t.platform?`<span class="bdg bplat">${t.platform}</span>`:''}${isShot?`<span class="bshot">Gedreht ✓</span>`:''}${t.refLink&&!isA?`<span style="font-size:10px;color:var(--text-muted)">${t.refLink}</span>`:''}</div>
            ${t.note?`<div class="tnote">${t.note}</div>`:''}
            ${t.postLink?`<a href="${t.postLink}" target="_blank" class="post-link"><i class="ti ti-external-link" style="font-size:12px"></i> Post öffnen</a>`:''}
          </div>
          <div class="tact">${action}<button class="btn-edit" onclick="window.editTask('${t.id}')"><i class="ti ti-edit"></i></button><button class="del-icon" onclick="window.deleteTask('${t.id}')"><i class="ti ti-trash"></i></button></div>
        </div>`;
      });
      html+='</div>';
    });
    document.getElementById('task-list').innerHTML=html;
  }

  if(!tasks.length){document.getElementById('zw-area').innerHTML='';return;}
  const zwGrouped={};
  tasks.forEach(t=>{if(!zwGrouped[t.date])zwGrouped[t.date]=[];zwGrouped[t.date].push(t);});
  let zwHtml=`<div class="zw-section"><div class="zw-label">Zwischenstand</div>`;
  Object.entries(zwGrouped).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,items])=>{
    const isToday=date===todayStr;
    const total=items.length;
    const posted=items.filter(t=>t.status==='Gepostet').length;
    const pct=total?Math.round((posted/total)*100):0;
    const barColor=pct===100?'var(--success)':pct>0?'var(--warning)':'rgba(255,255,255,0.05)';
    zwHtml+=`<div class="zw-day"><div class="zw-day-hdr">
      <div class="zw-day-title ${isToday?'zw-today':''}">${dayLabel(date)}</div>
      <div class="zw-day-count">${posted}/${total} gepostet</div>
      <div class="zw-bar"><div class="zw-fill" style="width:${pct}%;background:${barColor}"></div></div>
    </div>`;
    items.forEach(t=>{
      const isPosted=t.status==='Gepostet',isShot=t.status==='Gedreht',isA=t.type==='Aufgabe';
      const statusText=isPosted?'Gepostet ✓':isShot?'Gedreht — noch nicht gepostet':'Noch offen';
      const statusColor=isPosted?'var(--success)':isShot?'var(--warning)':'var(--text-muted)';
      const undoBtn=isPosted||isShot?`<button class="btn-undo-sm" onclick="window.undoStatus('${t.id}')">↩ Rückgängig</button>`:'';
      const linkBtn=t.postLink&&isPosted?`<a href="${t.postLink}" target="_blank" style="font-size:10px;color:var(--accent);text-decoration:none;margin-left:6px"><i class="ti ti-external-link" style="font-size:11px"></i></a>`:'';
      zwHtml+=`<div class="zw-item">
        <div class="zw-chk ${isPosted?'zp':isShot?'zs':''}">${isPosted||isShot?'✓':''}</div>
        <div class="zw-info">
          <div class="zw-title">${isA?t.refLink||'Aufgabe':t.type+' — '+t.platform}${linkBtn}</div>
          <div class="zw-status" style="color:${statusColor}">${statusText}</div>
        </div>
        ${undoBtn}
      </div>`;
    });
    zwHtml+='</div>';
  });
  zwHtml+='</div>';
  document.getElementById('zw-area').innerHTML=zwHtml;
}
</script>
</body>
</html>
