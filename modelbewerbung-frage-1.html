<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frage 1 – Veralta Management</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }

    header {
      background: linear-gradient(90deg, rgba(8,10,15,0.97) 0%, rgba(10,13,20,0.97) 100%);
      border-bottom: 1px solid rgba(92,225,230,0.1);
      padding: 0 6%;
      display: flex; align-items: center; justify-content: center;
      height: 70px;
      box-shadow: 0 1px 30px rgba(92,225,230,0.06);
      flex-shrink: 0;
    }

    .progress-wrap { background: #f0f0f0; height: 4px; width: 100%; flex-shrink: 0; }
    .progress-bar {
      height: 100%; width: 25%;
      background: linear-gradient(90deg, #5CE1E6, #2B9EA3);
      border-radius: 0 4px 4px 0;
    }

    .frage-wrap {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 24px 80px;
      max-width: 740px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
    }

    .frage-label {
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: #5CE1E6; margin-bottom: 16px;
    }
    .frage-sub {
      font-size: 0.95rem; color: #666;
      line-height: 1.7; margin-bottom: 28px;
      max-width: 580px;
    }
    .frage-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800; color: #0d0f14;
      margin-bottom: 36px;
      line-height: 1.2;
    }

    .input-wrap {
      width: 100%; max-width: 600px;
      border: 1.5px solid #e0e0e0;
      border-radius: 14px;
      padding: 20px 20px 20px 56px;
      display: flex; align-items: flex-start;
      gap: 12px; position: relative;
      transition: border-color 0.2s;
      margin-bottom: 32px;
      background: #fff;
    }
    .input-wrap:focus-within {
      border-color: #5CE1E6;
      box-shadow: 0 0 0 3px rgba(92,225,230,0.12);
    }
    .input-icon {
      position: absolute; left: 18px; top: 20px;
      font-size: 1.2rem; color: #ccc;
    }
    .input-wrap textarea {
      width: 100%; border: none; outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem; color: #1a1a1a;
      resize: none; min-height: 140px;
      background: transparent;
      line-height: 1.6;
    }
    .input-wrap textarea::placeholder { color: #bbb; }

    .btn-weiter {
      background: #5CE1E6;
      color: #0a0a0a;
      font-weight: 700; font-size: 1rem;
      padding: 16px 60px;
      border: none; border-radius: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase; letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(92,225,230,0.35);
      transition: all 0.2s;
    }
    .btn-weiter:hover {
      background: #4dd4d9;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(92,225,230,0.5);
    }

    footer {
      background: linear-gradient(180deg, #080a0f 0%, #0a0d15 100%);
      border-top: 1px solid rgba(92,225,230,0.1);
      padding: 30px 6%;
      flex-shrink: 0;
    }
    footer .inner {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }
    footer .legal { display: flex; gap: 0; align-items: center; }
    footer .legal a {
      font-size: 0.8rem; color: rgba(255,255,255,0.4);
      text-decoration: none; padding: 0 14px;
      transition: color 0.2s;
    }
    footer .legal a:hover { color: #5CE1E6; }
    footer .legal span { color: rgba(255,255,255,0.2); }
    footer .nr1 {
      font-size: 0.72rem; color: rgba(92,225,230,0.35);
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .insta-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(92,225,230,0.1);
      border: 1px solid rgba(92,225,230,0.25);
      display: flex; align-items: center; justify-content: center;
      color: #5CE1E6; text-decoration: none;
      transition: all 0.2s;
    }
    .insta-btn:hover { background: rgba(92,225,230,0.22); }
  </style>
</head>
