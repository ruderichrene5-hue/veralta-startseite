<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geschafft! – Veralta Management</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
    header {
      background: linear-gradient(90deg, rgba(8,10,15,0.97) 0%, rgba(10,13,20,0.97) 100%);
      border-bottom: 1px solid rgba(92,225,230,0.1);
      padding: 0 6%; display: flex; align-items: center; justify-content: center;
      height: 70px; box-shadow: 0 1px 30px rgba(92,225,230,0.06); flex-shrink: 0;
    }

    /* Türkis Banner */
    .banner {
      background: linear-gradient(90deg, #5CE1E6, #2B9EA3);
      padding: 18px 6%; text-align: center;
    }
    .banner span {
      font-size: 1.1rem; font-weight: 700; color: #0a0a0a;
    }

    /* Main */
    .danke-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 24px 70px; text-align: center;
    }
    .danke-wrap h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800; color: #0d0f14;
      margin-bottom: 16px;
    }
    .danke-wrap p {
      font-size: 1rem; color: #555;
      margin-bottom: 40px; line-height: 1.7;
    }
    .danke-img {
      width: 100%; max-width: 600px;
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      margin-bottom: 40px;
    }
    .danke-img img {
      width: 100%; height: 340px;
      object-fit: cover; object-position: center;
      display: block;
    }
    .btn-home {
      display: inline-block;
      background: #5CE1E6; color: #0a0a0a;
      font-weight: 700; font-size: 0.9rem;
      padding: 14px 36px; border-radius: 10px;
      text-decoration: none; text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(92,225,230,0.3);
      transition: all 0.2s;
    }
    .btn-home:hover { background: #4dd4d9; transform: translateY(-2px); }

    footer { background: linear-gradient(180deg, #080a0f 0%, #0a0d15 100%); border-top: 1px solid rgba(92,225,230,0.1); padding: 30px 6%; flex-shrink: 0; }
    footer .inner { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    footer .legal { display: flex; gap: 0; align-items: center; }
    footer .legal a { font-size: 0.8rem; color: rgba(255,255,255,0.4); text-decoration: none; padding: 0 14px; transition: color 0.2s; }
    footer .legal a:hover { color: #5CE1E6; }
    footer .legal span { color: rgba(255,255,255,0.2); }
    footer .nr1 { font-size: 0.72rem; color: rgba(92,225,230,0.35); letter-spacing: 1.5px; text-transform: uppercase; }
    .insta-btn { width: 36px; height: 36px; border-radius: 8px; background: rgba(92,225,230,0.1); border: 1px solid rgba(92,225,230,0.25); display: flex; align-items: center; justify-content: center; color: #5CE1E6; text-decoration: none; transition: all 0.2s; }
    .insta-btn:hover { background: rgba(92,225,230,0.22); }
  </style>
</head>
